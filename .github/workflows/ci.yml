name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install Linux build dependencies (iced GUI)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libxkbcommon-dev libwayland-dev libx11-dev libxi-dev \
            libxrandr-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev \
            libegl1-mesa-dev

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

  web:
    name: Web daemon (headless, no GUI packages)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # Deliberately no iced/windowing apt packages: the container build must
      # never need them.
      - name: Clippy (web)
        run: cargo clippy --locked --no-default-features --features web --all-targets -- -D warnings

      - name: Test (web)
        run: cargo test --locked --no-default-features --features web

      - name: Build republisherd
        run: cargo build --locked --no-default-features --features web --bin republisherd
